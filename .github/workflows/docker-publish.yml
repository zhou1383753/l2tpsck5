name: 自动构建镜像并发布到 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 必须具备写入权限以创建 Release

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 步骤一：拉取代码
        uses: actions/checkout@v4

      - name: 步骤二：安装 QEMU 模拟器
        uses: docker/setup-qemu-action@v3

      - name: 步骤三：安装 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 步骤四：构建并导出 tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          # 注意：这里改用 outputs 直接导出 tar，不再使用 load
          outputs: type=docker,dest=my-image.tar
          platforms: linux/amd64,linux/arm64
          tags: local-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 注意：移除原来的“步骤五：导出镜像为 tar 文件”（docker save），
      # 因为上一步的 outputs 已经直接生成了 my-image.tar。

      - name: 步骤六：发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: my-image.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
