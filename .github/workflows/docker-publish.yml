name: 自动构建镜像并发布到 Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published] # 当 Release 被发布时触发

permissions:
  contents: write  # 必须具备写入权限以创建 Release

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 定义架构矩阵
        platform: [linux/amd64, linux/arm64]
        include:
          # 根据架构设置不同的文件名
          - platform: linux/amd64
            output_name: image-amd64.tar
          - platform: linux/arm64
            output_name: image-arm64.tar
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 QEMU 和 Buildx
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}
      - uses: docker/setup-buildx-action@v3

      - name: 构建并导出特定架构 tar
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # 修改这里：将 type=oci 改为 type=docker
          outputs: type=docker,dest=${{ matrix.output_name }}
          platforms: ${{ matrix.platform }}
          tags: local-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 上传 Artifact (用于在 Release 步骤使用)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: ${{ matrix.output_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载 AMD64 tar
        uses: actions/download-artifact@v4
        with:
          name: image-amd64.tar
          path: artifacts
          
      - name: 下载 ARM64 tar
        uses: actions/download-artifact@v4
        with:
          name: image-arm64.tar
          path: artifacts

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/image-amd64.tar
            artifacts/image-arm64.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
